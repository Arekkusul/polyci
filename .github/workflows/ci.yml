name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # dogfood: build polyci and run its own gates through it
      - run: go build -o polyci .
      - run: ./polyci run
